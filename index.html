<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crochet Patterns</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-dark:   #3d5c34;
      --green-mid:    #4a6741;
      --green-light:  #7b9e5a;
      --green-pale:   #f0f5eb;
      --green-border: #c5dab0;
      --cream:        #faf7f2;
      --text:         #2e2e2e;
      --text-soft:    #5a5a5a;
      --accent:       #c07a2a;
      --border:       #e0d8cc;
      --radius:       10px;
    }

    body {
      font-family: Georgia, 'Times New Roman', serif;
      background: var(--cream);
      color: var(--text);
      line-height: 1.7;
      font-size: 16px;
      min-height: 100vh;
    }

    .site-header {
      background: var(--green-dark);
      color: #fff;
      text-align: center;
      padding: 56px 24px 44px;
    }
    .site-header .eyebrow {
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #a8c88a;
      margin-bottom: 14px;
    }
    .site-header h1 {
      font-size: clamp(36px, 7vw, 64px);
      font-weight: normal;
      letter-spacing: 6px;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 56px 24px 100px;
    }

    .section-label {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--green-mid);
      margin-bottom: 28px;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }

    .card {
      display: block;
      text-decoration: none;
      background: #fff;
      border: 1px solid var(--green-border);
      border-radius: var(--radius);
      padding: 32px 28px;
      transition: box-shadow 0.18s, border-color 0.18s, transform 0.18s;
    }
    .card:hover {
      box-shadow: 0 6px 24px rgba(61, 92, 52, 0.12);
      border-color: var(--green-light);
      transform: translateY(-2px);
    }

    .card-eyebrow {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--green-light);
      margin-bottom: 10px;
    }
    .card-title {
      font-size: 20px;
      font-weight: normal;
      color: var(--green-dark);
      letter-spacing: 1px;
    }
    .card-arrow {
      margin-top: 20px;
      font-size: 13px;
      color: var(--accent);
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="eyebrow">ptrestler</div>
    <h1>Crochet Patterns</h1>
  </header>

  <main class="container">
    <p class="section-label">Patterns</p>
    <div class="card-grid">

      <a class="card" href="ivy_top_adjusted.html">
        <div class="card-eyebrow">Pattern</div>
        <div class="card-title">Ivy Top — Adjusted Pattern</div>
        <div class="card-arrow">View →</div>
      </a>

      <a class="card" href="row counter.html">
        <div class="card-eyebrow">Tool</div>
        <div class="card-title">Ivy Top Row Counter</div>
        <div class="card-arrow">Open →</div>
      </a>

      <a class="card" href="hot_mesh_vest.html">
        <div class="card-eyebrow">Pattern</div>
        <div class="card-title">Hot Mesh Vest</div>
        <div class="card-arrow">View →</div>
      </a>

      <a class="card" href="detroit_lions_afghan.html">
        <div class="card-eyebrow">Pattern</div>
        <div class="card-title">Detroit Lions Afghan</div>
        <div class="card-arrow">View →</div>
      </a>

    </div>
  </main>

</body>
</html>
